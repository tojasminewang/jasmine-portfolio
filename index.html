<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jasmine Wang · Portfolio</title>
    <style>
      /* First-paint styling so the page never flashes white or shows text in
         the wrong font: cream background immediately, then the app fades in
         once the web fonts are ready (main.jsx adds the app-ready class). */
      html {
        background-color: #f7f3ec;
      }
      #root {
        opacity: 0;
      }
      html.app-ready #root {
        opacity: 1;
        transition: opacity 0.35s ease;
      }
      @media (prefers-reduced-motion: reduce) {
        html.app-ready #root {
          transition: none;
        }
      }
    </style>
    <noscript>
      <style>
        #root {
          opacity: 1 !important;
        }
      </style>
    </noscript>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#f7f3ec" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Great+Vibes&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
